name: Build RXDK Tools

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Create a GitHub Release with this tag (e.g. v1.0.0). Leave empty to build only.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: rxdk-tools-win-x64
          # Future ports: uncomment and implement scripts/ci/build-rxdktools-unix.sh (or per-OS scripts).
          # - os: ubuntu-latest
          #   platform: linux
          #   artifact_name: rxdk-tools-linux-x64
          # - os: macos-latest
          #   platform: macos
          #   artifact_name: rxdk-tools-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        if: matrix.platform == 'windows'
        uses: microsoft/setup-msbuild@v2

      - name: Build RXDKTools.sln
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/ci/build-rxdktools-windows.ps1

      - name: Build RXDKTools.sln (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: ./scripts/ci/build-rxdktools-unix.sh

      - name: Upload executables
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/rxdk-tools/*.exe
          if-no-files-found: error
          retention-days: 90

      - name: Build summary
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $exes = Get-ChildItem artifacts/rxdk-tools -Filter *.exe -File | Sort-Object Name
          $lines = $exes | ForEach-Object { "| $($_.Name) | $([math]::Round($_.Length / 1MB, 2)) MB |" }
          @(
            '### RXDK Tools binaries',
            '',
            '| File | Size |',
            '|------|------|',
            $lines
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

  release:
    name: GitHub Release
    needs: build
    if: |
      github.event_name != 'pull_request' && (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: rxdk-tools-win-x64
          path: dist

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            prerelease=false
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
            prerelease=true
          else
            tag="build-${GITHUB_RUN_NUMBER}"
            prerelease=true
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag (prerelease=$prerelease)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: RXDK Tools ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: dist/*.exe

      - name: Release summary
        shell: bash
        run: |
          {
            echo "### GitHub Release"
            echo ""
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- Pre-release: \`${{ steps.meta.outputs.prerelease }}\`"
            echo "- Assets: individual \`.exe\` files"
          } >> "$GITHUB_STEP_SUMMARY"
